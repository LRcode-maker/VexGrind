<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VexGrind — Sign Up / Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07090f;
      --bg2: #0d1220;
      --accent: #AC2E44;
      --accent2: #e84560;
      --blue: #1e6dff;
      --text: #f0f2ff;
      --muted: #7a82a0;
      --border: rgba(255,255,255,0.07);
      --card: rgba(255,255,255,0.04);
      --radius: 14px;
      --green: #4ade80;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 3rem;
      background: rgba(7,9,15,0.6);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.25rem;
      background: linear-gradient(135deg, #fff 40%, var(--accent2));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      text-decoration: none;
    }

    .page-bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 60% at 80% 20%, rgba(30,109,255,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(172,46,68,0.15) 0%, transparent 60%);
    }
    .page-bg::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .main {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 7rem 1.5rem 3rem;
    }

    .auth-card {
      background: rgba(13,18,32,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 2.5rem 2.5rem;
      width: 100%; max-width: 440px;
      backdrop-filter: blur(24px);
      animation: slideUp 0.5s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(172,46,68,0.15);
      border: 1px solid rgba(172,46,68,0.3);
      border-radius: 100px;
      padding: 0.3rem 0.9rem;
      font-size: 0.75rem; color: var(--accent2);
      margin-bottom: 1.5rem;
    }
    .auth-badge span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); display: inline-block; }

    .auth-title {
      font-family: 'Syne', sans-serif;
      font-size: 2rem; font-weight: 800;
      margin-bottom: 0.4rem;
    }
    .auth-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 2rem; line-height: 1.6; }

    .tabs {
      display: flex;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 2rem;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      border-radius: 7px;
      font-family: inherit; font-size: 0.87rem; font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
      background: transparent;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    .form-group { margin-bottom: 1.1rem; }
    .form-label {
      display: block; font-size: 0.8rem; font-weight: 500;
      color: var(--muted); margin-bottom: 0.45rem;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: inherit; font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .form-input:focus {
      border-color: rgba(172,46,68,0.5);
      background: rgba(172,46,68,0.05);
    }
    .form-input::placeholder { color: var(--muted); }

    .form-row { display: flex; gap: 0.75rem; }
    .form-row .form-group { flex: 1; }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none;
      padding: 0.85rem;
      border-radius: 10px;
      font-family: inherit; font-size: 0.95rem; font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 0.5rem;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .msg {
      padding: 0.7rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .msg.error { background: rgba(232,69,96,0.12); border: 1px solid rgba(232,69,96,0.3); color: var(--accent2); display: block; }
    .msg.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25); color: var(--green); display: block; }

    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.25rem 0; color: var(--muted); font-size: 0.8rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .link-btn {
      background: none; border: none;
      color: var(--accent2); font-family: inherit; font-size: 0.88rem;
      cursor: pointer; text-decoration: underline; padding: 0;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 500px) {
      .auth-card { padding: 1.75rem 1.25rem; }
      .main { padding: 6rem 1rem 2rem; }
      nav { padding: 1rem 1.25rem; }
      .form-row { flex-direction: column; gap: 0; }
    }
  </style>
</head>
<body>

<div class="page-bg"></div>

<nav>
  <a href="index.html" class="nav-logo">VexGrind</a>
</nav>

<div class="main">
  <div class="auth-card" id="authCard">
    <div class="auth-badge"><span></span> VEX V5 Competitor Portal</div>
    <h1 class="auth-title" id="authTitle">Join VexGrind</h1>
    <p class="auth-sub" id="authSub">Create your account and start winning more matches.</p>

    <div class="tabs">
      <button class="tab-btn active" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
      <button class="tab-btn" id="tabSignin" onclick="switchTab('signin')">Sign In</button>
    </div>

    <div id="msgBox" class="msg"></div>

    <!-- SIGN UP FORM -->
    <form id="signupForm" onsubmit="handleSignup(event)">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input class="form-input" id="su_first" type="text" placeholder="Alex" required autocomplete="given-name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input class="form-input" id="su_last" type="text" placeholder="Chen" required autocomplete="family-name"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="su_email" type="email" placeholder="you@team.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Team Number <span style="color:var(--muted);font-size:0.75rem;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input class="form-input" id="su_team" type="text" placeholder="e.g. 99999A"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="su_pass" type="password" placeholder="Min. 6 characters" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn-submit" id="signupBtn">Create Account →</button>
    </form>

    <!-- SIGN IN FORM -->
    <form id="signinForm" style="display:none;" onsubmit="handleSignin(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="si_email" type="email" placeholder="you@team.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="si_pass" type="password" placeholder="Your password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-submit" id="signinBtn">Sign In →</button>
      <div class="divider">or</div>
      <div style="text-align:center; font-size:0.85rem; color:var(--muted)">
        No account? <button type="button" class="link-btn" onclick="switchTab('signup')">Sign up free</button>
      </div>
    </form>
  </div>
</div>

<script>
  function getUsers() {
    try { return JSON.parse(localStorage.getItem('vexgrind_users') || '{}'); } catch { return {}; }
  }
  function saveUsers(u) { localStorage.setItem('vexgrind_users', JSON.stringify(u)); }

  function getUserData(email) { return getUsers()[email] || null; }
  function saveUserData(email, data) {
    const users = getUsers();
    users[email] = data;
    saveUsers(users);
  }

  function saveSession(s) { localStorage.setItem('vexgrind_session', JSON.stringify(s)); }
  function getSession() {
    try { return JSON.parse(localStorage.getItem('vexgrind_session') || 'null'); } catch { return null; }
  }

  function switchTab(tab) {
    clearMsg();
    const isSignup = tab === 'signup';
    document.getElementById('signupForm').style.display = isSignup ? '' : 'none';
    document.getElementById('signinForm').style.display = isSignup ? 'none' : '';
    document.getElementById('tabSignup').classList.toggle('active', isSignup);
    document.getElementById('tabSignin').classList.toggle('active', !isSignup);
    document.getElementById('authTitle').textContent = isSignup ? 'Join VexGrind' : 'Welcome back';
    document.getElementById('authSub').textContent = isSignup
      ? 'Create your account and start winning more matches.'
      : 'Sign in to access your guides and activity.';
  }

  function showMsg(text, type) {
    const el = document.getElementById('msgBox');
    el.textContent = text;
    el.className = 'msg ' + type;
  }
  function clearMsg() { document.getElementById('msgBox').className = 'msg'; }

  function handleSignup(e) {
    e.preventDefault();
    clearMsg();
    const first = document.getElementById('su_first').value.trim();
    const last  = document.getElementById('su_last').value.trim();
    const email = document.getElementById('su_email').value.trim().toLowerCase();
    const team  = document.getElementById('su_team').value.trim();
    const pass  = document.getElementById('su_pass').value;

    if (pass.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }

    const users = getUsers();
    if (users[email]) { showMsg('An account with this email already exists. Sign in instead.', 'error'); return; }

    const btn = document.getElementById('signupBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';

    setTimeout(() => {
      const newUser = {
        first, last, email, team,
        passwordHash: btoa(unescape(encodeURIComponent(pass))),
        createdAt: new Date().toISOString(),
        stats: { visits: 1, pages: 0 },
        activity: [{ action: 'Created account', icon: '🎉', time: new Date().toISOString() }]
      };
      saveUserData(email, newUser);
      saveSession({ email, loginAt: new Date().toISOString() });

      // Redirect to success page with name
      window.location.href = signup-success.html?name=${encodeURIComponent(first)}&team=${encodeURIComponent(team)};
    }, 800);
  }

  function handleSignin(e) {
    e.preventDefault();
    clearMsg();
    const email = document.getElementById('si_email').value.trim().toLowerCase();
    const pass  = document.getElementById('si_pass').value;

    const btn = document.getElementById('signinBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';

    setTimeout(() => {
      const data = getUserData(email);
      const hash = btoa(unescape(encodeURIComponent(pass)));
      if (!data || data.passwordHash !== hash) {
        showMsg('Incorrect email or password.', 'error');
        btn.disabled = false;
        btn.innerHTML = 'Sign In →';
        return;
      }
      data.stats = data.stats || { visits: 0, pages: 0 };
      data.stats.visits = (data.stats.visits || 0) + 1;
      data.activity = data.activity || [];
      data.activity.unshift({ action: 'Signed in', icon: '🔑', time: new Date().toISOString() });
      if (data.activity.length > 30) data.activity = data.activity.slice(0, 30);
      saveUserData(email, data);
      saveSession({ email, loginAt: new Date().toISOString() });

      showMsg('Signed in! Redirecting…', 'success');
      setTimeout(() => { window.location.href = 'index.html'; }, 1000);
      btn.disabled = false;
      btn.innerHTML = 'Sign In →';
    }, 700);
  }

  // Auto-redirect if already logged in
  window.addEventListener('DOMContentLoaded', () => {
    const session = getSession();
    if (session && getUserData(session.email)) {
      window.location.href = 'index.html';
    }
  });
</script>

</body>
</html>
